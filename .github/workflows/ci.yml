name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore back/Warehouse.sln
      - name: Restore .NET tools
        run: dotnet tool restore
        working-directory: back
      - name: Build
        run: dotnet build back/Warehouse.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test back/Warehouse.sln --no-build --verbosity normal
      - name: Verify EF Core migrations are up-to-date
        run: dotnet ef migrations has-pending-model-changes --project Warehouse.Infrastructure --startup-project Warehouse.Api
        working-directory: back

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
